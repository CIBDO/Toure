<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Fond abstrait sobre -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DEF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7367F0;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Formes géométriques abstraites -->
  <rect width="800" height="600" fill="url(#grad1)"/>
  
  <!-- Lignes verticales discrètes -->
  <line x1="150" y1="100" x2="150" y2="500" stroke="currentColor" stroke-width="1" opacity="0.08"/>
  <line x1="300" y1="80" x2="300" y2="520" stroke="currentColor" stroke-width="1" opacity="0.08"/>
  <line x1="450" y1="120" x2="450" y2="480" stroke="currentColor" stroke-width="1" opacity="0.08"/>
  <line x1="600" y1="90" x2="600" y2="510" stroke="currentColor" stroke-width="1" opacity="0.08"/>
  
  <!-- Formes rectangulaires empilées (représentant documents/supervision) -->
  <rect x="200" y="200" width="180" height="220" rx="4" fill="currentColor" opacity="0.04"/>
  <rect x="220" y="220" width="180" height="220" rx="4" fill="currentColor" opacity="0.06"/>
  <rect x="240" y="240" width="180" height="220" rx="4" fill="currentColor" opacity="0.08"/>
  
  <!-- Lignes horizontales discrètes -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="currentColor" stroke-width="1" opacity="0.06"/>
  <line x1="100" y1="350" x2="700" y2="350" stroke="currentColor" stroke-width="1" opacity="0.06"/>
  <line x1="100" y1="450" x2="700" y2="450" stroke="currentColor" stroke-width="1" opacity="0.06"/>
  
  <!-- Cercles discrets -->
  <circle cx="400" cy="150" r="60" fill="currentColor" opacity="0.03"/>
  <circle cx="500" cy="400" r="80" fill="currentColor" opacity="0.03"/>
  <circle cx="300" cy="450" r="50" fill="currentColor" opacity="0.03"/>
</svg>
